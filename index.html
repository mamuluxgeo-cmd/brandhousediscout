<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>ფასდაკლების კალკულატორი</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <div class="hero">
      <h1>ფასდაკლების კალკულატორი</h1>
    </div>

    <div class="card">

      <label for="price">თანხა</label>
      <input id="price" type="number" inputmode="numeric" placeholder="გასაყიდი ფასი">

      <div id="brands" class="brands"></div>

      <div class="result">
        <span>ფასდაკლებული ფასი:</span>
        <strong id="result">0 ₾</strong>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
